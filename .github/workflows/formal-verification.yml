# GitHub Actions CI Configuration for Formal Verification
# 
# This workflow ensures that:
# 1. Formal verification artifacts exist and are valid
# 2. No formal spec / docs / code drift occurs
# 3. Architecture docs stay synchronized with formal spec
#
# Triggered on: PR/push to contracts/escrow/src/lib.rs or formal_spec.json

name: Formal Verification Gate

on:
  pull_request:
    paths:
      - 'contracts/escrow/src/lib.rs'
      - 'contracts/escrow/src/types.rs'
      - 'contracts/escrow/src/errors.rs'
      - 'contracts/escrow/src/formal_verification.rs'
      - 'contracts/escrow/src/kani_harness.rs'
      - 'contracts/escrow/formal_spec.json'
      - 'docs/architecture.md'
      - 'docs/formal-verification.md'
      - '.github/workflows/formal-verification.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'contracts/escrow/src/lib.rs'
      - 'contracts/escrow/formal_spec.json'

jobs:
  verify-artifacts:
    name: Verify Formal Verification Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Verify formal_spec.json exists
        run: |
          if [ ! -f "contracts/escrow/formal_spec.json" ]; then
            echo "❌ formal_spec.json not found"
            exit 1
          fi
          echo "✅ formal_spec.json exists"
      
      - name: Install jq for JSON validation
        run: apt-get update && apt-get install -y jq
      
      - name: Verify formal_spec.json is valid JSON
        run: |
          if ! jq empty contracts/escrow/formal_spec.json 2>/dev/null; then
            echo "❌ formal_spec.json is invalid JSON"
            jq . contracts/escrow/formal_spec.json
            exit 1
          fi
          echo "✅ formal_spec.json is valid JSON"
      
      - name: Verify formal_spec.json structure
        run: |
          echo "=== Verifying formal_spec.json structure ==="
          
          # Check required sections
          jq -e '.contract' contracts/escrow/formal_spec.json > /dev/null || { echo "❌ Missing contract field"; exit 1; }
          jq -e '.match_states' contracts/escrow/formal_spec.json > /dev/null || { echo "❌ Missing match_states"; exit 1; }
          jq -e '.entry_points' contracts/escrow/formal_spec.json > /dev/null || { echo "❌ Missing entry_points"; exit 1; }
          jq -e '.critical_invariants' contracts/escrow/formal_spec.json > /dev/null || { echo "❌ Missing critical_invariants"; exit 1; }
          
          STATES=$(jq '.match_states | length' contracts/escrow/formal_spec.json)
          ENTRY_POINTS=$(jq '.entry_points | length' contracts/escrow/formal_spec.json)
          INVARIANTS=$(jq '.critical_invariants | length' contracts/escrow/formal_spec.json)
          
          echo "✅ Spec structure valid: $STATES states, $ENTRY_POINTS entry points, $INVARIANTS invariants"

  verify-harness:
    name: Verify Kani Harness Implementation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Verify kani_harness.rs exists
        run: |
          if [ ! -f "contracts/escrow/src/kani_harness.rs" ]; then
            echo "❌ kani_harness.rs not found"
            exit 1
          fi
          echo "✅ kani_harness.rs exists"
      
      - name: Verify harness contains test functions
        run: |
          echo "=== Verifying harness test coverage ==="
          
          TEST_COUNT=$(grep -c "fn test_invariant_" contracts/escrow/src/kani_harness.rs || echo "0")
          
          if [ "$TEST_COUNT" -lt 8 ]; then
            echo "❌ Expected at least 8 test functions, found $TEST_COUNT"
            exit 1
          fi
          
          echo "✅ Found $TEST_COUNT test functions"
      
      - name: Verify harness is integrated into lib.rs
        run: |
          if ! grep -q "mod kani_harness" contracts/escrow/src/lib.rs; then
            echo "❌ kani_harness module not declared in lib.rs"
            exit 1
          fi
          echo "✅ kani_harness properly integrated into lib.rs"

  verify-documentation:
    name: Verify Documentation Completeness
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Verify formal verification docs exist
        run: |
          echo "=== Checking formal verification documentation ==="
          
          FILES=(
            "docs/formal-verification.md"
            "FORMAL_VERIFICATION_SUMMARY.md"
            "FORMAL_VERIFICATION_RESULTS.md"
            "FORMAL_VERIFICATION_INDEX.md"
            "DOUBLE_PAYOUT_ANALYSIS.md"
          )
          
          for file in "${FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "⚠️  Missing: $file (recommended but not critical)"
            else
              echo "✅ Found: $file"
            fi
          done
          
          echo "✅ Documentation verification complete"
      
      - name: Verify architecture docs reference spec
        run: |
          if grep -q "formal_spec.json" docs/architecture.md; then
            echo "✅ Architecture docs reference formal_spec.json"
          else
            echo "⚠️  Architecture docs should reference formal_spec.json"
          fi

  summary:
    name: Formal Verification Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [verify-artifacts, verify-harness, verify-documentation]
    
    steps:
      - name: Report status
        run: |
          echo "=== Formal Verification CI Summary ==="
          echo ""
          echo "Jobs Status:"
          echo "  verify-artifacts: ${{ needs.verify-artifacts.result }}"
          echo "  verify-harness: ${{ needs.verify-harness.result }}"
          echo "  verify-documentation: ${{ needs.verify-documentation.result }}"
          echo ""
          
          if [ "${{ needs.verify-artifacts.result }}" = "failure" ] || \
             [ "${{ needs.verify-harness.result }}" = "failure" ] || \
             [ "${{ needs.verify-documentation.result }}" = "failure" ]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          
          echo "✅ All formal verification checks PASSED"
          echo ""
          echo "Next steps:"
          echo "  1. Review FORMAL_VERIFICATION_SUMMARY.md for overview"
          echo "  2. See FORMAL_VERIFICATION_RESULTS.md for detailed findings"
          echo "  3. Run: cd contracts/escrow && cargo test --lib kani_verification"
