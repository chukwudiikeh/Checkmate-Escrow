# GitHub Actions CI Configuration for Formal Verification
# 
# This workflow ensures that:
# 1. All changes to contracts/escrow/src/lib.rs pass formal verification
# 2. No formal spec / docs / code drift occurs
# 3. Architecture docs stay synchronized with formal spec
#
# Triggered on: PR/push to contracts/escrow/src/lib.rs

name: Formal Verification Gate

on:
  pull_request:
    paths:
      - 'contracts/escrow/src/lib.rs'
      - 'contracts/escrow/src/types.rs'
      - 'contracts/escrow/src/errors.rs'
      - 'contracts/escrow/src/formal_verification.rs'
      - 'contracts/escrow/src/kani_harness.rs'
      - 'contracts/escrow/formal_spec.json'
      - 'docs/architecture.md'
      - '.github/workflows/formal-verification.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'contracts/escrow/src/lib.rs'
      - 'contracts/escrow/src/types.rs'
      - 'contracts/escrow/src/errors.rs'

jobs:
  formal-verification:
    name: Run Formal Verification Harness
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Install Kani
        run: |
          cargo install kani
          kani --version
      
      - name: Run formal verification harness
        working-directory: contracts/escrow
        run: |
          echo "=== Running Formal Verification Harness ==="
          cargo kani --quiet 2>&1 | tee kani_output.log
          
          # Check for violations
          if grep -q "FAILED\|violation\|VIOLATION" kani_output.log; then
            echo "❌ Formal verification FAILED - invariant violations detected"
            cat kani_output.log
            exit 1
          else
            echo "✅ Formal verification PASSED - all invariants verified"
          fi
      
      - name: Run comprehensive test suite
        working-directory: contracts/escrow
        run: |
          echo "=== Running Comprehensive Test Suite ==="
          cargo test --lib kani_verification -- --nocapture --test-threads=1
          
          if [ $? -ne 0 ]; then
            echo "❌ Test suite FAILED"
            exit 1
          fi
          echo "✅ Test suite PASSED"

  spec-sync-check:
    name: Verify Spec/Code/Docs Synchronization
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y jq python3
      
      - name: Verify formal_spec.json exists and is valid JSON
        run: |
          if [ ! -f "contracts/escrow/formal_spec.json" ]; then
            echo "❌ formal_spec.json not found"
            exit 1
          fi
          
          if ! jq empty contracts/escrow/formal_spec.json 2>/dev/null; then
            echo "❌ formal_spec.json is invalid JSON"
            exit 1
          fi
          
          echo "✅ formal_spec.json is valid"
      
      - name: Extract state machine from formal_spec.json
        run: |
          STATES=$(jq -r '.match_states[] | .state' contracts/escrow/formal_spec.json | sort)
          echo "States in formal_spec.json:"
          echo "$STATES"
          echo "SPEC_STATES=$STATES" >> $GITHUB_ENV
      
      - name: Verify all states in types.rs
        run: |
          echo "=== Checking state definitions in types.rs ==="
          
          for state in Pending Active PendingResult Completed Cancelled Paused; do
            if ! grep -q "pub enum MatchState" contracts/escrow/src/types.rs; then
              echo "❌ MatchState enum not found in types.rs"
              exit 1
            fi
            
            if ! grep -q "$state" contracts/escrow/src/types.rs; then
              echo "❌ State '$state' not found in types.rs"
              exit 1
            fi
          done
          
          echo "✅ All states defined in types.rs"
      
      - name: Verify entry points match in formal_spec.json
        run: |
          echo "=== Checking entry points ==="
          
          SPEC_ENTRY_POINTS=$(jq -r '.entry_points[] | .name' contracts/escrow/formal_spec.json | sort | uniq)
          LIB_ENTRY_POINTS=$(grep -o "pub fn [a-z_]*" contracts/escrow/src/lib.rs | sed 's/pub fn //' | sort | uniq)
          
          # Check if key entry points are documented
          for ep in initialize create_match deposit submit_result cancel_match pause_match resume_match finalize_match; do
            if ! echo "$SPEC_ENTRY_POINTS" | grep -q "^$ep$"; then
              echo "⚠️  Warning: Entry point '$ep' not found in formal_spec.json"
            fi
          done
          
          echo "✅ Entry point cross-check complete"
      
      - name: Verify docs/architecture.md references formal_spec.json
        run: |
          if ! grep -q "formal_spec.json" docs/architecture.md; then
            echo "⚠️  Warning: docs/architecture.md does not reference formal_spec.json"
            echo "   Consider adding reference to formal spec as source of truth"
          else
            echo "✅ docs/architecture.md properly references formal_spec.json"
          fi
          
          if ! grep -q "6 Match States" docs/architecture.md; then
            echo "⚠️  Warning: docs/architecture.md may be outdated (missing '6 Match States' section)"
          fi
      
      - name: Verify formal-verification.md exists
        run: |
          if [ ! -f "docs/formal-verification.md" ]; then
            echo "❌ docs/formal-verification.md not found"
            exit 1
          fi
          echo "✅ Formal verification methodology documented"

  invariant-coverage:
    name: Verify Invariant Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check invariant coverage
        run: |
          echo "=== Checking Invariant Coverage ==="
          
          # Extract invariants from formal_spec.json
          INVARIANTS=$(jq -r '.critical_invariants[] | .id' contracts/escrow/formal_spec.json)
          
          echo "Invariants in formal_spec.json:"
          echo "$INVARIANTS"
          
          # Check that harness covers all invariants
          for inv in $INVARIANTS; do
            # Convert to test function name (e.g., INV_NO_DOUBLE_PAYOUT -> test_invariant_no_double_payout)
            TEST_NAME=$(echo "$inv" | tr '[:upper:]' '[:lower:]' | sed 's/_/\n/g' | sed '1d' | tr '\n' '_' | sed 's/_$//')
            
            if ! grep -q "$TEST_NAME" contracts/escrow/src/kani_harness.rs; then
              echo "⚠️  Warning: Test for invariant '$inv' may not be in harness"
            fi
          done
          
          echo "✅ Invariant coverage check complete"

  documentation-check:
    name: Verify Documentation Completeness
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check for FORMAL_VERIFICATION_RESULTS.md
        run: |
          if [ ! -f "FORMAL_VERIFICATION_RESULTS.md" ]; then
            echo "⚠️  FORMAL_VERIFICATION_RESULTS.md not found"
          else
            echo "✅ FORMAL_VERIFICATION_RESULTS.md found"
            
            # Verify it contains results
            if ! grep -q "violations found" FORMAL_VERIFICATION_RESULTS.md; then
              echo "⚠️  FORMAL_VERIFICATION_RESULTS.md may be incomplete"
            fi
          fi
      
      - name: Check for DOUBLE_PAYOUT_ANALYSIS.md
        run: |
          if [ ! -f "DOUBLE_PAYOUT_ANALYSIS.md" ]; then
            echo "⚠️  DOUBLE_PAYOUT_ANALYSIS.md not found"
          else
            echo "✅ DOUBLE_PAYOUT_ANALYSIS.md found"
          fi

  summary:
    name: Formal Verification Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [formal-verification, spec-sync-check, invariant-coverage, documentation-check]
    
    steps:
      - name: Check job status
        run: |
          echo "=== Formal Verification CI Summary ==="
          echo ""
          echo "Jobs Status:"
          echo "  formal-verification: ${{ needs.formal-verification.result }}"
          echo "  spec-sync-check: ${{ needs.spec-sync-check.result }}"
          echo "  invariant-coverage: ${{ needs.invariant-coverage.result }}"
          echo "  documentation-check: ${{ needs.documentation-check.result }}"
          echo ""
          
          if [ "${{ needs.formal-verification.result }}" = "failure" ]; then
            echo "❌ Formal verification FAILED"
            exit 1
          fi
          
          if [ "${{ needs.spec-sync-check.result }}" = "failure" ]; then
            echo "❌ Specification sync check FAILED"
            exit 1
          fi
          
          echo "✅ All formal verification checks PASSED"
